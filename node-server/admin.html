<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>

<h2>Admin Control Panel</h2>

<label>Festival (0 or 1):</label><br>
<input type="number" id="festival"><br><br>

<label>Curfew (0 or 1):</label><br>
<input type="number" id="curfew"><br><br>

<label>Weekly Earnings (₹):</label><br>
<input type="number" id="salary" placeholder="Enter amount" min="0" step="any"><br><br>

<button onclick="updateSettings()">Update</button>

<script>
async function updateSettings() {
  const festival = document.getElementById("festival").value;
  const curfew = document.getElementById("curfew").value;
  const salary = document.getElementById("salary").value;
  const res = await fetch("http://192.168.137.1:3000/admin/update", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      festival: Number(festival || 0),
      curfew: Number(curfew || 0),
      salary: Number(salary || 0)
    
    })
  });

  const data = await res.json();
  alert("Updated!");
  console.log(data);
  
}

</script>

</body>
</html>
